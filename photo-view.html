<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo - Aster Rose Farm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body { background: #000; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
        .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        img { max-width: 95%; max-height: 95vh; object-fit: contain; }
        .back { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.3); color: white; border: none; padding: 10px 20px; font-size: 14px; cursor: pointer; border-radius: 4px; }
        .back:hover { background: rgba(255,255,255,0.6); }
        .close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.3); color: white; border: none; font-size: 32px; width: 50px; height: 50px; cursor: pointer; border-radius: 4px; }
        .close:hover { background: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="container">
        <button class="back" onclick="history.back()">Back</button>
        <button class="close" onclick="window.location='index.html'">&times;</button>
        <img id="img">
    </div>
    <script>
        let url = new URL(window.location);
        let file = url.searchParams.get('img');
        document.getElementById('img').src = 'images/' + file;
    </script>
</body>
</html>
