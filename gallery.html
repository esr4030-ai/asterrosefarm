<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gallery - Aster Rose Farm">
    <title>Gallery - Aster Rose Farm</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <h1><a href="index.html">Aster Rose Farms</a></h1>
            <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="facilities.html">Facilities</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Page Header -->
        <section class="hero" style="background-image: url('images/arena.jpg');">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>Gallery</h1>
            </div>
        </section>

        <!-- Gallery Section -->
        <section class="gallery-section">
            <div class="container">
                <h2>Browse Photos</h2>
                
                <!-- Barn & Facility Section -->
                <div class="folder-section">
                    <h3>Barn & Facilities</h3>
                    <div class="gallery-container">
                        <a href="photo-view.html?img=Arial-view.jpg" class="gallery-item">
                            <img src="images/Arial-view.jpg" alt="Aerial view of facility">
                        </a>
                        <a href="photo-view.html?img=arena.jpg" class="gallery-item">
                            <img src="images/arena.jpg" alt="Arena with jumps">
                        </a>
                        <a href="photo-view.html?img=Barn.jpg" class="gallery-item">
                            <img src="images/Barn.jpg" alt="Barn exterior">
                        </a>
                        <a href="photo-view.html?img=Barn-covered.jpg" class="gallery-item">
                            <img src="images/Barn-covered.jpg" alt="Covered barn area">
                        </a>
                        <a href="photo-view.html?img=Courtyard.jpg" class="gallery-item">
                            <img src="images/Courtyard.jpg" alt="Courtyard">
                        </a>
                        <a href="photo-view.html?img=stalls-side.jpg" class="gallery-item">
                            <img src="images/stalls-side.jpg" alt="Stalls">
                        </a>
                    </div>
                </div>

                <!-- Riders Section -->
                <div class="folder-section">
                    <h3>Riders</h3>
                    <div class="gallery-container">
                        <a href="photo-view.html?img=sophie.jpg" class="gallery-item">
                            <img src="images/sophie.jpg" alt="Sophie riding">
                        </a>
                        <a href="photo-view.html?img=sophie_copy2_copy.jpg" class="gallery-item">
                            <img src="images/sophie_copy2_copy.jpg" alt="Sophie competing">
                        </a>
                        <a href="photo-view.html?img=Alyce.jpg" class="gallery-item">
                            <img src="images/Alyce.jpg" alt="Alyce riding">
                        </a>
                        <a href="photo-view.html?img=Alyce_copy.jpg" class="gallery-item">
                            <img src="images/Alyce_copy.jpg" alt="Alyce competing">
                        </a>
                        <a href="photo-view.html?img=Alyce_copy_2_copy.jpg" class="gallery-item">
                            <img src="images/Alyce_copy_2_copy.jpg" alt="Alyce jumping">
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Aster Rose Farm. All Rights Reserved.</p>
            <p>
                <a href="tel:+15616316638">(561) 631-6638</a> | 
                <a href="mailto:johan@bluerose-edelweiss.com">johan@bluerose-edelweiss.com</a><br>
                4591 South Road, Wellington, FL 33414<br>
                <a href="https://www.google.com/maps?q=4591+South+Road+Wellington+FL+33414" target="_blank">Google Directions</a><br>
                <a href="https://www.facebook.com/p/Aster-Rose-Farm-61578276521560/" target="_blank">Facebook</a>
            </p>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        }

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navMenu').classList.remove('active');
            });
        });
    </script>
</body>
</html>
